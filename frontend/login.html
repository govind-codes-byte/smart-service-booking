<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign In — ServeNow</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡ Serve<span>Now</span></div>
    <h2 style="margin-bottom:6px;text-align:center">Welcome back</h2>
    <p style="color:var(--text-muted);text-align:center;margin-bottom:28px;font-size:.9rem">Sign in to your account</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px">Sign In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <p style="text-align:center;font-size:.9rem;color:var(--text-muted)">
      Don't have an account? <a href="/register.html">Create one</a>
    </p>
    <p style="text-align:center;margin-top:12px">
      <a href="/index.html" style="color:var(--text-muted);font-size:.85rem">← Back to home</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) {
    const u = getUser();
    if (u?.role === "admin") location.href = "/admin.html";
    else if (u?.role === "provider") location.href = "/provider.html";
    else location.href = "/dashboard.html";
  }
</script>
</body>
</html>
