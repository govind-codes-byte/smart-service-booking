<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — ServeNow</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/index.html">⚡ Serve<span>Now</span></a>
  <div class="nav-links" id="nav-links">
    <a href="/services.html">Services</a>
    <div id="guest-links" style="display:none"></div>
    <div id="user-links" style="display:flex;gap:8px;align-items:center">
      <a href="/dashboard.html" style="color:var(--amber)">Dashboard</a>
      <a href="/provider.html" id="provider-link" style="display:none">My Services</a>
      <a href="/admin.html" id="admin-link" style="display:none">Admin</a>
      <span style="color:var(--text-muted);font-size:.88rem" id="nav-username"></span>
      <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </div>
</nav>

<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div style="padding:0 14px 24px">
      <div style="font-weight:700;font-size:1rem" id="user-name">…</div>
      <div style="font-size:.8rem;color:var(--text-muted)" id="user-email">…</div>
      <span class="badge badge-category" style="margin-top:6px" id="user-role-badge">user</span>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" data-tab="bookings">
        <span class="icon">📋</span> My Bookings
      </button>
      <button class="sidebar-item" data-tab="profile">
        <span class="icon">👤</span> Profile
      </button>
    </nav>
    <div style="margin-top:auto;padding-top:24px">
      <a href="/services.html" class="btn btn-primary btn-full btn-sm">Browse Services</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <!-- Bookings Tab -->
    <div class="tab-panel" id="tab-bookings">
      <div class="section-header">
        <h2>My Bookings</h2>
        <a href="/services.html" class="btn btn-primary btn-sm">+ Book Service</a>
      </div>
      <div id="bookings-list"></div>
    </div>

    <!-- Profile Tab -->
    <div class="tab-panel" id="tab-profile" style="display:none">
      <h2 style="margin-bottom:24px">Profile</h2>
      <div class="card" style="max-width:400px">
        <div class="form-group">
          <label>Name</label>
          <p id="profile-name" style="color:var(--text);font-weight:500"></p>
        </div>
        <hr class="divider"/>
        <div class="form-group">
          <label>Email</label>
          <p id="profile-email" style="color:var(--text-muted);font-size:.9rem"></p>
        </div>
        <hr class="divider"/>
        <div class="form-group">
          <label>Role</label>
          <span class="badge badge-category" id="profile-role"></span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Review Modal -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3>Leave a Review</h3>
        <p id="review-service-title" style="color:var(--amber);margin-top:4px;font-size:.9rem"></p>
      </div>
      <button class="modal-close" onclick="closeModal('review-modal')">✕</button>
    </div>
    <input type="hidden" id="review-service-id"/>
    <div class="form-group">
      <label>Rating</label>
      <div class="star-input">
        <input type="radio" name="rating" id="r5" value="5"/><label for="r5">★</label>
        <input type="radio" name="rating" id="r4" value="4"/><label for="r4">★</label>
        <input type="radio" name="rating" id="r3" value="3"/><label for="r3">★</label>
        <input type="radio" name="rating" id="r2" value="2"/><label for="r2">★</label>
        <input type="radio" name="rating" id="r1" value="1"/><label for="r1">★</label>
      </div>
    </div>
    <div class="form-group">
      <label>Comment</label>
      <textarea class="form-control" id="review-comment" rows="3" placeholder="Share your experience…"></textarea>
    </div>
    <button class="btn btn-primary btn-full" id="submit-review-btn">Submit Review</button>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script>
  // Populate profile tab
  document.addEventListener("DOMContentLoaded", () => {
    const u = getUser();
    if (u) {
      document.getElementById("profile-name").textContent = u.name;
      document.getElementById("profile-email").textContent = u.email;
      document.getElementById("profile-role").textContent = u.role;
    }
  });
</script>
</body>
</html>
