<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register — ServeNow</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡ Serve<span>Now</span></div>
    <h2 style="margin-bottom:6px;text-align:center">Create your account</h2>
    <p style="color:var(--text-muted);text-align:center;margin-bottom:28px;font-size:.9rem">Join thousands of users &amp; providers</p>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full name</label>
        <input class="form-control" type="text" id="name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input class="form-control" type="tel" id="phone" placeholder="+91 9876543210"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Min 6 characters" required/>
      </div>
      <div class="form-group">
        <label for="role">I want to</label>
        <select class="form-control" id="role" required>
          <option value="user">Book services (Customer)</option>
          <option value="provider">Provide services (Professional)</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px">Create Account</button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <p style="text-align:center;font-size:.9rem;color:var(--text-muted)">
      Already have an account? <a href="/login.html">Sign in</a>
    </p>
    <p style="text-align:center;margin-top:12px">
      <a href="/index.html" style="color:var(--text-muted);font-size:.85rem">← Back to home</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
